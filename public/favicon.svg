<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- グラデーション定義 -->
  <defs>
    <!-- メイングラデーション -->
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
<!-- 背景用グラデーション -->
<linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
  <stop offset="100%" style="stop-color:#C084FC;stop-opacity:1" />
</linearGradient>
  </defs>
  <!-- 背景円 -->
  <circle cx="16" cy="16" r="15" fill="url(#bgGradient)" opacity="0.15"/>
  <circle cx="16" cy="16" r="14" fill="none" stroke="url(#bgGradient)" stroke-width="1.5"/>
  <!-- ビデオカメラアイコン（中央配置） -->
  <g transform="translate(8, 10)">
    <!-- カメラ本体 -->
    <rect x="0" y="2" width="10" height="8" rx="1.5" fill="url(#faviconGradient)"/>
    <!-- レンズ -->
    <path d="M10 6 L13 3.5 Q15 2.5 15 4.5 L15 7.5 Q15 9.5 13 8.5 L10 6" fill="url(#faviconGradient)"/>
    <!-- 録画インジケーター -->
    <circle cx="3" cy="6" r="1.2" fill="#EF4444">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- スパークル（小さく） -->
  <g transform="translate(20, 6)" opacity="0.7">
    <path d="M0 2 L1 2 L2 0 L3 2 L4 2 L3 3 L3.5 5 L2 4 L0.5 5 L1 3 Z" fill="#FCD34D"/>
  </g>
</svg>