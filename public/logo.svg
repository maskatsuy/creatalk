<svg width="240" height="60" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
  <!-- グラデーション定義 -->
  <defs>
    <!-- メイングラデーション -->
    <linearGradient id="mainGradientJP4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
<!-- アイコン用グラデーション -->
<linearGradient id="iconGradientJP4" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
  <stop offset="100%" style="stop-color:#C084FC;stop-opacity:1" />
</linearGradient>

<!-- グロー効果 -->
<filter id="glowJP4">
  <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
  <feMerge>
    <feMergeNode in="coloredBlur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

<!-- 日本語フォント設定 -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&amp;display=swap');
  .jp-text {
    font-family: 'M PLUS Rounded 1c', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
  }
</style>
  </defs>
  <!-- アイコン部分 -->
  <g transform="translate(10, 10)">
    <!-- 外側の円（カメラレンズ風） -->
    <circle cx="20" cy="20" r="20" fill="url(#iconGradientJP4)" opacity="0.2"/>
    <circle cx="20" cy="20" r="18" fill="none" stroke="url(#iconGradientJP4)" stroke-width="2"/>
<!-- ビデオカメラアイコン -->
<g transform="translate(10, 12)">
  <!-- カメラ本体 -->
  <rect x="0" y="3" width="14" height="10" rx="2" fill="url(#mainGradientJP4)"/>
  <!-- レンズ -->
  <path d="M14 8 L18 5 Q20 4 20 6 L20 10 Q20 12 18 11 L14 8" fill="url(#mainGradientJP4)"/>
  <!-- 録画インジケーター -->
  <circle cx="4" cy="8" r="1.5" fill="#EF4444" filter="url(#glowJP4)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- スパークル効果 -->
<g transform="translate(25, 5)" opacity="0.8">
  <path d="M0 3 L2 3 L3 0 L4 3 L6 3 L4 5 L5 8 L3 6 L1 8 L2 5 Z" fill="#FCD34D" filter="url(#glowJP4)">
    <animateTransform attributeName="transform" type="rotate" from="0 3 4" to="360 3 4" dur="10s" repeatCount="indefinite"/>
  </path>
</g>
  </g>
  <!-- テキスト部分 -->
  <g transform="translate(60, 15)">
    <!-- クリエトーク テキスト（カタカナ） -->
    <text x="0" y="20" class="jp-text" font-size="24" font-weight="bold" fill="url(#mainGradientJP4)">
      クリエトーク
    </text>
<!-- 英語表記（小さく） -->
<text x="0" y="32" font-family="Arial, sans-serif" font-size="8" fill="#A1A1AA">
  Creatalk
</text>

<!-- サブテキスト -->
<text x="0" y="42" class="jp-text" font-size="9" fill="#71717A" opacity="0.8">
  クリエイターとファンをつなぐ
</text>
  </g>
  <!-- 追加の装飾線（波線） -->
  <g opacity="0.3">
    <path d="M55 30 Q100 25 145 30 T235 30" stroke="url(#mainGradientJP4)" stroke-width="0.5" fill="none"/>
  </g>
</svg>